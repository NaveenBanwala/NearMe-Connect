# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=nearme-backend
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://nearme-db:5432/nearme
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Jackson Configuration ───────────────────────────────────────────────────
# This fixes the "campus" vs "CAMPUS" issue
spring.jackson.mapper.accept-case-insensitive-enums=true

# This forces JSON to use block_id instead of blockId
spring.jackson.property-naming-strategy=SNAKE_CASE

spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect


spring.flyway.repair-on-migrate=true

# spring.jackson.deserialization.fail-on-unknown-properties=false
# spring.jackson.serialization.write-dates-as-timestamps=false


# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.format_sql=false

# ── Flyway migrations ─────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ── File upload limits ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ── JWT ───────────────────────────────────────────────────────────────────────
# IMPORTANT: Change this to a long random string in production
# Generate one with: openssl rand -hex 64
jwt.secret=${JWT_SECRET:changeme-replace-with-64-char-random-string-in-production-env}
jwt.expiry-ms=${JWT_EXPIRY_MS:86400000}

# ── Firebase ──────────────────────────────────────────────────────────────────
firebase.service-account-key=${FIREBASE_SERVICE_ACCOUNT_KEY:firebase-service-account.json}
firebase.database-url=${FIREBASE_DATABASE_URL:https://nearme-connect-default-rtdb.firebaseio.com}

# ── AWS S3 (image uploads) ────────────────────────────────────────────────────
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}
aws.bucket-name=${AWS_BUCKET_NAME:nearme-uploads}
aws.region=${AWS_REGION:ap-south-1}

# ── Twilio (OTP SMS) ──────────────────────────────────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}
twilio.verify-service-sid=${TWILIO_VERIFY_SERVICE_SID:}

# ── Heat score scheduler ──────────────────────────────────────────────────────
# How often heat score recalculates (milliseconds). Default = 2 minutes
heat.recalc-interval-ms=${HEAT_RECALC_INTERVAL:120000}
heat.live-user-window-minutes=15

# ── Block voting thresholds ───────────────────────────────────────────────────
block.default-campus-threshold=${DEFAULT_CAMPUS_THRESHOLD:50}
block.default-locality-threshold=${DEFAULT_LOCALITY_THRESHOLD:25}
block.default-society-threshold=20
block.default-market-threshold=30
block.vote-cluster-radius-meters=500

# ── Actuator (health check for CI/CD) ────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.nearme=INFO
logging.level.org.springframework.security=TRACE
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO


# Tell Spring Security to ignore actuator
management.security.enabled=false

